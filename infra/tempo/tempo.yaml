# Tempo 2.x single-binary, local storage (dev). The OTLP receiver is the export target the Java
# services point OTEL_OTLP_ENDPOINT at (http:4318); without it traces never arrive.
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 72h        # traces are heavy — shorter than logs/metrics

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal
