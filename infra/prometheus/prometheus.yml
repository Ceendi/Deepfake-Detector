global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Java services expose Micrometer metrics at /actuator/prometheus (D3). Targets are the
  # in-network service names + ports from docker-compose; they read DOWN until the service is up.
  - job_name: orchestrator
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['orchestrator:8082']
  - job_name: gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['gateway:8080']
  - job_name: file-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['file-service:8081']

  # RabbitMQ broker metrics (rabbitmq_prometheus plugin, port 15692) — queue depth, etc.
  - job_name: rabbitmq
    static_configs:
      - targets: ['rabbitmq:15692']

  # Python detectors expose prometheus_client metrics at /metrics (profile ml; DOWN otherwise).
  - job_name: video-detector
    metrics_path: /metrics
    static_configs:
      - targets: ['video-detector:8000']
  - job_name: audio-detector
    metrics_path: /metrics
    static_configs:
      - targets: ['audio-detector:8000']
