name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java:
    name: java (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [gateway, eureka-server, orchestrator, file-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      # Each service is its own Maven project (own mvnw, no root reactor) -> cd + ./mvnw. The
      # *ApplicationTests smoke tests are Testcontainers-backed (need the runner's Docker, like the
      # other ITs). rerunFailingTestsCount tolerates the odd Testcontainers connection flake.
      - name: verify
        working-directory: ${{ matrix.service }}
        run: ./mvnw -B verify -Dsurefire.rerunFailingTestsCount=2

  python:
    name: python (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [video-detector, audio-detector]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # Lint only for now: detectors are placeholders with no tests; pytest with real ML deps is week 11.
      - name: ruff
        working-directory: ${{ matrix.service }}
        run: uvx ruff check .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test:run        # vitest; passWithNoTests until the suite lands. Playwright e2e is NOT in CI.
      - run: npm run build
