name: deepfake-detector

# Profiles:
#   core       - infrastructure required by every developer (DB, broker, cache, object storage)
#   auth       - identity provider (Keycloak)
#   ml         - GPU-bound detector services
#   monitoring - Prometheus, Loki, Tempo, Grafana

# Cap container logs so a forgotten dev stack can't fill the disk.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# Block in-container privilege escalation. Safe for every service here.
x-security: &default-security
  - no-new-privileges:true

# Shared hardening for postgres-based services (`postgres`, `keycloak-db`).
# Caps are the minimum alpine initdb needs; tmpfs covers writes the
# read_only rootfs would block (psql temp + entrypoint's unix socket dir).
x-pg-hardening: &pg-hardening
  security_opt: *default-security
  cap_drop: [ALL]
  cap_add:
    - CHOWN
    - DAC_READ_SEARCH
    - FOWNER
    - SETGID
    - SETUID
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,size=64m
    - /run/postgresql:rw,noexec,nosuid,size=32m

# OIDC resource-server config shared by every JWT-validating Java service.
# iss is validated against the public URL the token carries (KC_HOSTNAME), but the
# signing keys are fetched from Keycloak over the docker network — `localhost` inside
# a container is the container itself, so it can't reach the host's published port.
x-jwt-env: &jwt-env
  JWT_ISSUER_URI: http://localhost:${KEYCLOAK_PORT:-8180}/realms/deepfake
  JWK_SET_URI: http://keycloak:8080/realms/deepfake/protocol/openid-connect/certs

# Tracing shared by every Java service. The tracer is always on (traceId/spanId in
# logs = D2); only OTLP *export* is gated, so it stays off until the monitoring
# profile (Tempo) exists — otherwise the exporter spams a dead tempo:4318.
x-otel-env: &otel-env
  OTEL_TRACING_EXPORT_ENABLED: ${OTEL_TRACING_EXPORT_ENABLED:-false}
  OTEL_OTLP_ENDPOINT: ${OTEL_OTLP_ENDPOINT:-http://tempo:4318/v1/traces}

# Native Spring Boot 4 structured logging (ECS JSON on stdout) — only in containers, so Alloy can
# parse fields into Loki. Local IDE runs (no env) keep the human-readable pattern. NB: this makes
# `docker logs <svc>` JSON in every profile, not just monitoring.
x-logging-env: &logging-env
  LOGGING_STRUCTURED_FORMAT_CONSOLE: ecs

services:
  postgres:
    image: postgres:18.4-alpine
    profiles: ["core"]
    restart: unless-stopped
    stop_grace_period: 30s # let Postgres flush WAL on shutdown
    <<: *pg-hardening
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
          pids: 200
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data
      # Consumed by the init script to create the file-service DB + least-privilege user.
      FILE_SERVICE_DB_NAME: ${FILE_SERVICE_DB_NAME}
      FILE_SERVICE_DB_USER: ${FILE_SERVICE_DB_USER}
      FILE_SERVICE_DB_PASSWORD: ${FILE_SERVICE_DB_PASSWORD}
    ports:
      # 127.0.0.1 prefix: don't expose dev creds to LAN.
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # initdb runs *.sh here ONLY on an empty pgdata (first start). On an existing volume,
      # create the fileservice DB/user by hand or `docker volume rm` the pgdata volume.
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks: [deepfake]

  redis:
    image: redis:8.8.0-alpine
    profiles: ["core"]
    restart: unless-stopped
    security_opt: *default-security
    cap_drop: [ALL]
    cap_add:
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
          pids: 100
    logging: *default-logging
    # DEV-ONLY: password in argv is acceptable for local dev.
    # Prod will use redis.conf via secret.
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --save
      - "60"
      - "1"
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD}",
          "--no-auth-warning",
          "ping",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks: [deepfake]

  rabbitmq:
    image: rabbitmq:4.3.1-management-alpine
    profiles: ["core"]
    restart: unless-stopped
    stop_grace_period: 30s # flush queues to disk before exit
    security_opt: *default-security
    cap_drop: [ALL]
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    # No read_only: RabbitMQ + management plugin need writable /etc/rabbitmq
    # (Erlang cookie) and /var/log/rabbitmq on first boot. Revisit in prod.
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
          pids: 500
    logging: *default-logging
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "127.0.0.1:${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "127.0.0.1:${RABBITMQ_UI_PORT:-15672}:15672"
      - "127.0.0.1:${RABBITMQ_PROM_PORT:-15692}:15692" # rabbitmq_prometheus /metrics
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
      # Enable the prometheus plugin alongside management (replaces the image default).
      - ./infra/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      # Per-queue prometheus metrics (queue label).
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks: [deepfake]

  seaweedfs:
    image: chrislusf/seaweedfs:4.32
    profiles: ["core"]
    restart: unless-stopped
    stop_grace_period: 30s # volume server flushes outstanding writes on SIGTERM
    security_opt: *default-security
    cap_drop: [ALL]
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
          pids: 500
    logging: *default-logging
    depends_on:
      seaweedfs-init:
        condition: service_completed_successfully
    command:
      - server
      - -dir=/data
      - -s3
      - -s3.port=8333
      - -s3.config=/etc/seaweedfs/s3.json
      - -master.volumeSizeLimitMB=2000
      # 0 = auto-derive max volume count from available disk size (SeaweedFS 4.x).
      # This is the documented "use whatever the disk allows" mode for dev.
      - -volume.max=0
      # Bind to all interfaces; without this `weed server` listens only on
      # the eth0 IP and the in-container healthcheck on localhost gets
      # ECONNREFUSED. Required for `wget http://localhost:8333/` to work.
      - -ip.bind=0.0.0.0
    ports:
      # 8333 = S3 API (only port apps need). Master/volume/filer (9333/8080/8888)
      # stay internal to the docker network.
      - "127.0.0.1:${S3_PORT:-8333}:8333"
    volumes:
      - seaweeddata:/data
      - seaweedconfig:/etc/seaweedfs:ro
    healthcheck:
      # S3 API responds 403 to unauthenticated GET / - that's "alive" enough.
      # 200/403 both mean the gateway is up.
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null --server-response http://localhost:8333/ 2>&1 | grep -qE 'HTTP/.* (200|403)'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks: [deepfake]

  seaweedfs-init:
    # Phase 1 (pre-start): renders /etc/seaweedfs/s3.json from the template
    # using env vars, populated into the shared `seaweedconfig` volume.
    # Runs before the main seaweedfs service starts (via depends_on).
    # Runs as root: the seaweedfs image entrypoint also runs as root, so a
    # 0644 file written here is readable downstream regardless of ownership.
    image: alpine:3.23
    profiles: ["core"]
    security_opt: *default-security
    cap_drop: [ALL]
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.25"
          pids: 50
    logging: *default-logging
    environment:
      S3_ADMIN_KEY: ${S3_ADMIN_KEY}
      S3_ADMIN_SECRET: ${S3_ADMIN_SECRET}
      S3_FILE_SERVICE_KEY: ${S3_FILE_SERVICE_KEY}
      S3_FILE_SERVICE_SECRET: ${S3_FILE_SERVICE_SECRET}
      S3_DETECTOR_KEY: ${S3_DETECTOR_KEY}
      S3_DETECTOR_SECRET: ${S3_DETECTOR_SECRET}
      S3_ORCHESTRATOR_KEY: ${S3_ORCHESTRATOR_KEY}
      S3_ORCHESTRATOR_SECRET: ${S3_ORCHESTRATOR_SECRET}
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ./infra/seaweedfs/init.sh:/init.sh:ro
      - ./infra/seaweedfs/s3.json.tmpl:/s3.json.tmpl:ro
      - seaweedconfig:/out
    networks: [deepfake]

  seaweedfs-bucket-init:
    # Phase 2 (post-healthy): creates the required buckets via S3 API using
    # the admin identity. Runs once after seaweedfs is healthy.
    image: amazon/aws-cli:2.34.63
    profiles: ["core"]
    security_opt: *default-security
    cap_drop: [ALL]
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
          pids: 50
    logging: *default-logging
    depends_on:
      seaweedfs:
        condition: service_healthy
    environment:
      S3_ADMIN_KEY: ${S3_ADMIN_KEY}
      S3_ADMIN_SECRET: ${S3_ADMIN_SECRET}
    entrypoint: ["/bin/sh", "/bucket-init.sh"]
    volumes:
      - ./infra/seaweedfs/bucket-init.sh:/bucket-init.sh:ro
    networks: [deepfake]

  keycloak-db:
    # Dedicated Postgres for Keycloak. Without this, start-dev would fall back
    # to in-memory H2 — every `compose down` would wipe users created in dev,
    # which is annoying when testing login flows. Postgres from day one.
    image: postgres:18.4-alpine
    profiles: ["auth"]
    restart: unless-stopped
    stop_grace_period: 30s
    <<: *pg-hardening
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
          pids: 200
    logging: *default-logging
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      POSTGRES_DB: keycloak
      PGDATA: /var/lib/postgresql/data
    volumes:
      - keycloak-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks: [deepfake]

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    profiles: ["auth"]
    restart: unless-stopped
    stop_grace_period: 30s # let in-flight HTTP / DB connections drain
    security_opt: *default-security
    cap_drop: [ALL]
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
          pids: 500
    logging: *default-logging
    depends_on:
      keycloak-db:
        condition: service_healthy
    # DEV-ONLY: start-dev disables HTTPS and skips the provider build cache.
    # Realm import owned by keycloak-config-cli (idempotent) — see ADR-0001.
    command: ["start-dev"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # Persistence: dedicated Postgres (keycloak-db) — users survive restarts.
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      # Locks the JWT iss claim to this URL regardless of caller's network.
      # Backends inside docker reach it via host-gateway (extra_hosts).
      KC_HOSTNAME: http://localhost:${KEYCLOAK_PORT:-8180}
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "127.0.0.1:${KEYCLOAK_PORT:-8180}:8080"
    healthcheck:
      # KC UBI image has no curl/wget — raw bash /dev/tcp probe against the
      # management port (9000, internal) where /health/ready lives.
      test:
        - CMD-SHELL
        - "exec 3<>/dev/tcp/localhost/9000 && printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks: [deepfake]

  keycloak-config-cli:
    # Version pin: cli was built/tested against KC 26.5.4; our KC is 26.6.1.
    # Forward-compatible for the API surface we use — see ADR-0001 §Consequences.
    image: adorsys/keycloak-config-cli:6.5.1-26.5.5
    profiles: ["auth"]
    restart: "no"
    security_opt: *default-security
    cap_drop: [ALL]
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "0.5"
          pids: 200
    logging: *default-logging
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      # Admin REST API, not OIDC — uses the internal hostname, not the
      # localhost issuer URL the Java services need via extra_hosts.
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_USER: ${KEYCLOAK_ADMIN}
      KEYCLOAK_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_AVAILABILITYCHECK_ENABLED: "true"
      KEYCLOAK_AVAILABILITYCHECK_TIMEOUT: 120s
      IMPORT_FILES_LOCATIONS: /config/*.json
      IMPORT_VARSUBSTITUTION_ENABLED: "true"
      # Default for everything else is `full`; users get `no-delete` so UI-created
      # accounts survive sync. See ADR-0001 §Consequences.
      IMPORT_MANAGED_USER: no-delete
      # Substituted into realm-export.json as $(env:LOADTEST_CLIENT_SECRET) — the D4 load-test client secret.
      LOADTEST_CLIENT_SECRET: ${LOADTEST_CLIENT_SECRET}
    volumes:
      - ./infra/keycloak/realm-export.json:/config/realm-export.json:ro
    networks: [deepfake]

  eureka-server:
    build: ./eureka-server
    profiles: ["core"]
    ports: ["8761:8761"]
    environment:
      <<: *logging-env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 10s
      retries: 10
    networks: [deepfake]

  gateway:
    build: ./gateway
    profiles: ["core"]
    depends_on:
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports: ["8080:8080"]
    environment:
      <<: [*jwt-env, *otel-env, *logging-env]
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # D4: upload rate-limit, env-tunable (raise for the load test). Defaults = prod values.
      UPLOAD_RL_REPLENISH: ${UPLOAD_RL_REPLENISH:-1}
      UPLOAD_RL_BURST: ${UPLOAD_RL_BURST:-10}
    networks: [deepfake]

  file-service:
    build: ./file-service
    profiles: ["core"]
    # D4: scale 1<->2 via FILE_SERVICE_REPLICAS. Replicas only work here because the service has no
    # host port (reached via Gateway lb://file-service) — do NOT add ports/container_name. The CPU
    # cap is the point: 1 vCPU/replica, so a 2nd replica ~doubles the CPU-bound (ffprobe+Tika) capacity.
    deploy:
      replicas: ${FILE_SERVICE_REPLICAS:-1}
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    depends_on:
      postgres: { condition: service_healthy }
      eureka-server: { condition: service_healthy }
      seaweedfs: { condition: service_healthy }
      seaweedfs-bucket-init: { condition: service_completed_successfully }
    environment:
      <<: [*jwt-env, *otel-env, *logging-env]
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      FILE_SERVICE_DB_NAME: ${FILE_SERVICE_DB_NAME}
      FILE_SERVICE_DB_USER: ${FILE_SERVICE_DB_USER}
      FILE_SERVICE_DB_PASSWORD: ${FILE_SERVICE_DB_PASSWORD}
      S3_FILE_SERVICE_KEY: ${S3_FILE_SERVICE_KEY}
      S3_FILE_SERVICE_SECRET: ${S3_FILE_SERVICE_SECRET}
      # Host baked into presigned URLs — must be browser-reachable, not the internal endpoint.
      STORAGE_PUBLIC_ENDPOINT: ${STORAGE_PUBLIC_ENDPOINT:-http://localhost:8333}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 15s
      retries: 10
    networks: [deepfake]

  orchestrator:
    build: ./orchestrator
    profiles: ["core"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      eureka-server: { condition: service_healthy }
    environment:
      <<: [*jwt-env, *otel-env, *logging-env]
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      S3_ORCHESTRATOR_KEY: ${S3_ORCHESTRATOR_KEY}
      S3_ORCHESTRATOR_SECRET: ${S3_ORCHESTRATOR_SECRET}
      BACKPRESSURE_MAX_INFLIGHT: ${BACKPRESSURE_MAX_INFLIGHT:-20}
      # MO benchmark knobs (defaults = prod): cache-aside on/off, HikariCP max pool size.
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 15s
      retries: 15
      start_period: 40s
    networks: [deepfake]

  video-detector:
    build: ./video-detector
    profiles: ["ml"]
    restart: unless-stopped
    security_opt: *default-security
    cap_drop: [ALL]
    deploy:
      resources:
        limits:
          memory: 3g
          pids: 500
    logging: *default-logging
    depends_on:
      rabbitmq: { condition: service_healthy }
      seaweedfs: { condition: service_healthy }
      seaweedfs-bucket-init: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      QUEUE_NAME: analysis.video
      SOURCE_LABEL: video
      S3_ENDPOINT: http://seaweedfs:8333
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${S3_DETECTOR_KEY}
      S3_SECRET_KEY: ${S3_DETECTOR_SECRET}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks: [deepfake]

  audio-detector:
    build: ./audio-detector
    profiles: ["ml"]
    restart: unless-stopped
    security_opt: *default-security
    cap_drop: [ALL]
    deploy:
      resources:
        limits:
          memory: 3g
          pids: 500
    logging: *default-logging
    depends_on:
      rabbitmq: { condition: service_healthy }
      seaweedfs: { condition: service_healthy }
      seaweedfs-bucket-init: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      QUEUE_NAME: analysis.audio
      SOURCE_LABEL: audio
      S3_ENDPOINT: http://seaweedfs:8333
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${S3_DETECTOR_KEY}
      S3_SECRET_KEY: ${S3_DETECTOR_SECRET}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks: [deepfake]

  # --- Observability stack (profile: monitoring) ---------------------------------------------
  # Dev-only: prometheus/loki/tempo/alloy run as root with named volumes (avoids uid/perms juggling
  # on fresh volumes) — the app/db containers above stay hardened. All ports bound to 127.0.0.1.
  prometheus:
    image: prom/prometheus:v3.12.0
    profiles: ["monitoring"]
    restart: unless-stopped
    user: "0:0"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *default-logging
    networks: [deepfake]

  loki:
    image: grafana/loki:3.7.2
    profiles: ["monitoring"]
    restart: unless-stopped
    user: "0:0"
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./infra/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    ports:
      - "127.0.0.1:${LOKI_PORT:-3100}:3100"
    # No healthcheck: the loki image is distroless (no shell/wget to probe with). Dependents wait on
    # service_started; loki.write/Grafana both retry until /ready returns 200.
    logging: *default-logging
    networks: [deepfake]

  tempo:
    image: grafana/tempo:2.10.6
    profiles: ["monitoring"]
    restart: unless-stopped
    user: "0:0"
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./infra/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      # Query API only; OTLP receivers 4317/4318 stay internal (Java services push over the network).
      - "127.0.0.1:${TEMPO_PORT:-3200}:3200"
    # No healthcheck: distroless image (see loki). Dependents wait on service_started.
    logging: *default-logging
    networks: [deepfake]

  grafana:
    image: grafana/grafana:11.6.15
    profiles: ["monitoring"]
    restart: unless-stopped
    depends_on:
      prometheus: { condition: service_healthy }
      loki: { condition: service_started }
      tempo: { condition: service_started }
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *default-logging
    networks: [deepfake]

  alloy:
    image: grafana/alloy:v1.16.3
    profiles: ["monitoring"]
    restart: unless-stopped
    user: "0:0" # reads the root-owned docker socket
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    depends_on:
      loki: { condition: service_started }
    volumes:
      - ./infra/alloy/config.alloy:/etc/alloy/config.alloy:ro
      # #G1: dev-only, read-only — Alloy tails container stdout via the Docker API.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    ports:
      - "127.0.0.1:${ALLOY_PORT:-12345}:12345"
    # No healthcheck: the alloy image has no wget; nothing depends on alloy's health. Readiness is at
    # http://localhost:12345/-/ready (UI on the same port).
    logging: *default-logging
    networks: [deepfake]

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
  seaweeddata:
  seaweedconfig:
  keycloak-pgdata:
  prometheus-data:
  loki-data:
  tempo-data:
  alloy-data:

networks:
  deepfake:
    name: deepfake
