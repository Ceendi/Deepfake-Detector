server:
  port:
    8081
spring:
  application:
    name: file-service
  security:
    oauth2:
      resourceserver:
        jwt:
          # issuer-uri: Spring fetches OIDC discovery (JWKS) and validates the iss claim
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/deepfake}
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
storage:
  endpoint: http://seaweedfs:8333
  region: us-east-1
  access-key: ${S3_FILE_SERVICE_KEY}
  secret-key: ${S3_FILE_SERVICE_SECRET}
  bucket: deepfake-uploads
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always