server:
  port: 8080
spring:
  application:
    name: gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          # issuer-uri validates the iss claim (public URL in the token); jwk-set-uri is where
          # keys are actually fetched (internal URL in docker, so no host-gateway hacks needed).
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8180/realms/deepfake}
          jwk-set-uri: ${JWK_SET_URI:http://localhost:8180/realms/deepfake/protocol/openid-connect/certs}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:5173"
                  - "http://localhost:4173"
                allowedMethods: ["GET","POST","PUT","DELETE","PATCH","OPTIONS"]
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600
          routes:
            # Upload route first (more specific): stricter bucket, ~10 burst / ~60/min sustained.
            - id: file-service-upload
              uri: lb://file-service
              predicates:
                - Path=/api/files/upload
                - Method=POST
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 1
                    redis-rate-limiter.burstCapacity: 10
                    key-resolver: "#{@userKeyResolver}"
            - id: file-service
              uri: lb://file-service
              predicates:
                - Path=/api/files/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 2
                    redis-rate-limiter.burstCapacity: 100
                    key-resolver: "#{@userKeyResolver}"
            - id: orchestrator
              uri: lb://orchestrator
              predicates:
                - Path=/api/analysis/**,/ws/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 2
                    redis-rate-limiter.burstCapacity: 100
                    key-resolver: "#{@userKeyResolver}"
          default-filters:
            - name: RequestSize
              args:
                maxSize: 500MB
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0          # dev: sample everything; prod → ~0.1
    # Gate EXPORT only — see orchestrator/application.yaml for the rationale.
    export:
      enabled: ${OTEL_TRACING_EXPORT_ENABLED:false}
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_OTLP_ENDPOINT:http://tempo:4318/v1/traces}
logging:
  pattern:
    console: '%d{ISO8601} %-5level [%X{correlationId:-},%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n'