server:
  port: 8082
spring:
  application:
    name: orchestrator
  datasource:
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      # Dzień 1: auto-ack — Spring acknowledguje po pomyślnym return z metody
      # listenera, na exception nack. Wystarcza dla walking skeleton.
      # Semestr 1 tydz 5 (wymaganie D6 — DLQ consumer + idempotentność):
      # przejdziemy na manual i listenery przyjmą Channel + @Header(AmqpHeaders.DELIVERY_TAG)
      # żeby ręcznie ack/nack po commitcie transakcji.
      simple:
        acknowledge-mode: auto
        prefetch: 1
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
logging:
  pattern:
    console: '%d{ISO8601} %-5level [%X{correlationId:-},%X{traceId:-}] %logger{36} - %msg%n'