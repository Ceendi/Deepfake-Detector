server:
  port: 8082
spring:
  application:
    name: orchestrator
  security:
    oauth2:
      resourceserver:
        jwt:
          # issuer-uri validates the iss claim (public URL in the token); jwk-set-uri is where
          # keys are actually fetched (internal URL in docker, so no host-gateway hacks needed).
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8180/realms/deepfake}
          jwk-set-uri: ${JWK_SET_URI:http://localhost:8180/realms/deepfake/protocol/openid-connect/certs}
  datasource:
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      # AUTO = container acks after the listener returns (after the @Transactional commit), not
      # RabbitMQ auto-ack — required so retry + recoverer compose (MANUAL would never auto-ack).
      simple:
        acknowledge-mode: auto
        prefetch: 1
        # Spans (traceId in MDC) for the consumer thread; reads traceparent off the message.
        observation-enabled: true
        # Exhausted retries -> RepublishMessageRecoverer (RabbitConfig) -> analysis.results.dlq.
        retry:
          enabled: true
          max-attempts: 4
          initial-interval: 1s
          multiplier: 4
          max-interval: 15s
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
backpressure:
  # Max concurrent in-flight analyses before POST /api/analysis returns 429 (counts analyses, not
  # detector tasks). Env-overridable so load tests can trip it (e.g. =2 with dummy ML).
  max-inflight: ${BACKPRESSURE_MAX_INFLIGHT:20}
  retry-after-seconds: ${BACKPRESSURE_RETRY_AFTER_SECONDS:5}
reliability:
  idempotency:
    # TTL of the per-result dedup key (dedup:{id}:{source}); long enough to cover broker redeliveries.
    ttl-seconds: ${RELIABILITY_IDEMPOTENCY_TTL_SECONDS:900}
  stuck-job:
    # An active analysis with no progress for this long is auto-failed. Lower it (e.g. =10) and kill a
    # detector after POST to demo recovery; with dummy ML (~2s) nothing reaches it normally.
    threshold-seconds: ${RELIABILITY_STUCK_JOB_THRESHOLD_SECONDS:600}
    scan-interval-ms: ${RELIABILITY_STUCK_JOB_SCAN_INTERVAL_MS:300000}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0          # dev: sample everything; prod → ~0.1
    # Gate EXPORT only. Tracer + Micrometer bridge stay ON, so traceId/spanId
    # reach MDC/logs (D2). The OTLP collector (Tempo) lands with the monitoring
    # profile (week 5); until then export is off so it can't spam a dead endpoint.
    export:
      enabled: ${OTEL_TRACING_EXPORT_ENABLED:false}
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_OTLP_ENDPOINT:http://tempo:4318/v1/traces}
  otlp:
    metrics:
      export:
        # Metrics ship via Prometheus scrape (/actuator/prometheus, D3). The OTLP meter registry
        # arrives transitively with the OpenTelemetry starter and is unused here — disabled so it
        # doesn't push to (and fail against) a non-existent OTLP collector every minute.
        enabled: false
logging:
  pattern:
    console: '%d{ISO8601} %-5level [%X{correlationId:-},%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n'