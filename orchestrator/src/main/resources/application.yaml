server:
  port: 8082
spring:
  application:
    name: orchestrator
  security:
    oauth2:
      resourceserver:
        jwt:
          # issuer-uri: Spring fetches OIDC discovery (JWKS) and validates the iss claim
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8180/realms/deepfake}
  datasource:
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      # auto-ack: Spring acks on successful listener return, nacks on exception.
      # TODO(week 5, D6): switch to manual ack (Channel + DELIVERY_TAG) after tx commit.
      simple:
        acknowledge-mode: auto
        prefetch: 1
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
logging:
  pattern:
    console: '%d{ISO8601} %-5level [%X{correlationId:-},%X{traceId:-}] %logger{36} - %msg%n'